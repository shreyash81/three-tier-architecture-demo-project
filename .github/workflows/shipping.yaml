name: CI - Shipping

on:
  push:
    branches:
      - main
    paths:
      - 'shipping/**'
  pull_request:
    branches:
      - main
    paths:
      - 'shipping/**'
      - '.github/workflows/shipping.yaml'

jobs:
  build:
    name: Build and Push Shipping Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Maven Package
        run: |
          cd shipping
          mvn clean package -DskipTests

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./shipping
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rs-shipping:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/rs-shipping:latest

  update-helm-values:
    name: Update custom-values.yaml
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: false

      - name: Update version in custom-values.yaml
        run: |
          NEW_TAG="${{ needs.build.outputs.image_tag }}"
          sed -i "/^shipping:/,/^[^ ]/ s|^  version:.*|  version: ${NEW_TAG}|" EKS/helm/custom-values.yaml

      - name: Commit and push
        run: |
          git config user.name  "shreyash81"
          git config user.email "chauhanshreyash357@gmail.com"
          git add EKS/helm/custom-values.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci(shipping): update image tag to ${{ needs.build.outputs.image_tag }} [skip ci]"
            git push
          fi
