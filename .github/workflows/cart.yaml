name: CI - Cart

on:
  push:
    branches:
      - main
    paths:
      - 'cart/**'
      - '.github/workflows/cart.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'cart/**'
      - '.github/workflows/cart.yaml'

jobs:
  build:
    name: Build and Push Cart Image
    runs-on: [self-hosted]

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: NPM Install
        run: |
          cd cart
          npm install

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./cart
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rs-cart:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/rs-cart:latest

  update-helm-values:
    name: Update custom-values.yaml
    runs-on: [self-hosted]
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update version in custom-values.yaml
        run: |
          NEW_TAG="${{ needs.build.outputs.image_tag }}"
          sed -i "s|^  version:.*|  version: ${NEW_TAG}|" EKS/helm/custom-values.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add EKS/helm/custom-values.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci(cart): update image tag to ${{ needs.build.outputs.image_tag }} [skip ci]"
            git push
          fi
